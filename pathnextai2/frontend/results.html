<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Results — PathNext AI</title>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-logo"><div class="nav-logo-box">🧭</div>PathNext AI</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/assessment">← Retake</a></li>
  </ul>
</nav>

<div class="results-page">
  <div class="results-wrap">

    <div class="results-header">
      <div class="sec-badge">✅ Analysis Complete</div>
      <h1 class="sec-title" style="margin-top:12px">Your Career Recommendations</h1>
      <p style="color:var(--text2);font-size:15px;margin-top:8px">Based on your academic profile, interests, and soft skills</p>
    </div>

    <!-- Top 3 career cards -->
    <div class="career-row" id="careerRow"></div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="card chart-card">
        <div class="chart-label">Confidence Scores</div>
        <div class="chart-box"><canvas id="barChart"></canvas></div>
      </div>
      <div class="card chart-card">
        <div class="chart-label">Skill Radar</div>
        <div class="chart-box"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="card chart-card">
        <div class="chart-label">Interest Mix</div>
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
      </div>
    </div>

    <!-- AI explanation -->
    <div class="ai-card">
      <div class="ai-head">
        <div class="ai-icon">🤖</div>
        <div>
          <div class="ai-meta-title">AI Career Counsellor</div>
          <div class="ai-meta-sub">Personalised explanation based on your profile</div>
        </div>
      </div>
      <div class="ai-body" id="aiBody"><span class="blink"></span></div>
    </div>

    <!-- Career detail tabs -->
    <div class="card detail-card">
      <div class="tabs-row" id="tabsRow"></div>
      <div id="tabPanels"></div>
    </div>

    <div class="result-actions">
      <a href="/" class="btn btn-outline">← Back to Home</a>
      <a href="/assessment" class="btn btn-primary">🔁 Retake Assessment</a>
    </div>

  </div>
</div>

<script src="js/animations.js"></script>
<script src="js/charts.js"></script>
<script>
// Load saved data
const raw = sessionStorage.getItem('pn_results');
if (!raw) { window.location.href = '/assessment'; }
const data = JSON.parse(raw);
const preds = data.predictions;
const student = data.student_data;

// ── Career cards ────────────────────────────────────────────────
function buildCards() {
  const rankCls = ['rank1','rank2','rank3'];
  const rankLbl = ['#1 Match','#2 Match','#3 Match'];
  document.getElementById('careerRow').innerHTML = preds.map((p,i) => `
    <div class="c-card ${i===0?'on':''}" id="cc${i}" onclick="switchTab(${i})">
      <div class="cc-top">
        <span class="cc-rank ${rankCls[i]}">${rankLbl[i]}</span>
        <span class="cc-pct">${Math.round(p.confidence*100)}%</span>
      </div>
      <div class="cc-icon">${p.icon||'🎯'}</div>
      <div class="cc-name">${p.career}</div>
      <div class="cc-bar"><div class="cc-fill" id="cf${i}"></div></div>
    </div>`).join('');
  setTimeout(() => preds.forEach((_,i) => {
    document.getElementById('cf'+i).style.width = (preds[i].confidence*100)+'%';
  }), 300);
}

// ── Tabs ────────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('tabsRow').innerHTML = preds.map((p,i) => `
    <button class="tab ${i===0?'on':''}" id="tb${i}" onclick="switchTab(${i})">${p.icon||'🎯'} ${p.career}</button>`).join('');

  document.getElementById('tabPanels').innerHTML = preds.map((p,i) => `
    <div class="tab-panel ${i===0?'on':''}" id="tp${i}">
      <div class="why-box"><b>Why it fits you:</b> ${p.why||'Your profile strongly aligns with this career.'}</div>
      <div class="d-grid">
        <div class="d-col">
          <h4>⚡ Skills Required</h4>
          <ul>${(p.skills||[]).map((s,j)=>`<li><div class="d-num nb">${j+1}</div>${s}</li>`).join('')}</ul>
        </div>
        <div class="d-col">
          <h4>🗺 Beginner Roadmap</h4>
          <ul>${(p.roadmap||[]).map((r,j)=>`<li><div class="d-num ng">${j+1}</div>${r}</li>`).join('')}</ul>
        </div>
        <div class="d-col">
          <h4>🏛 Top Mumbai Colleges</h4>
          <ul>${(p.colleges||[]).map((c,j)=>`<li><div class="d-num np">${j+1}</div>${c}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`).join('');
}

function switchTab(i) {
  ['cc','tb','tp'].forEach(prefix => {
    document.querySelectorAll(`[id^="${prefix}"]`).forEach((el,j) => el.classList.toggle('on', j===i));
  });
}

// ── AI typing ────────────────────────────────────────────────────
function typeAI() {
  const p = preds[0];
  const interests = (student.interests||[]).slice(0,3).map(x=>x.replace('interest_','').replace(/_/g,' ')).join(', ');
  const text = p.why || `Based on your ${student.stream} background, interests in ${interests}, and your soft skill profile, PathNext AI recommends ${p.career} as your strongest career match at ${Math.round(p.confidence*100)}% confidence. Your analytical and problem-solving scores show real potential here. Follow the roadmap below to get started! 🚀`;
  const el = document.getElementById('aiBody');
  el.innerHTML = '<span class="blink"></span>';
  let i = 0;
  const t = setInterval(() => {
    if (i < text.length) { el.innerHTML = text.slice(0,++i) + '<span class="blink"></span>'; }
    else { el.innerHTML = text; clearInterval(t); }
  }, 14);
}

// ── Charts ────────────────────────────────────────────────────────
function buildCharts() {
  const GRID  = 'rgba(255,255,255,0.05)';
  const TXTC  = '#4a6080';

  // BAR
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: preds.map(p => p.career.length > 16 ? p.career.slice(0,15)+'…' : p.career),
      datasets: [{ data: preds.map(p=>Math.round(p.confidence*100)),
        backgroundColor:['rgba(0,144,255,.8)','rgba(99,102,241,.7)','rgba(6,182,212,.6)'],
        borderRadius:8, borderSkipped:false }]
    },
    options: { responsive:true, maintainAspectRatio:false, animation:{duration:900,easing:'easeOutQuart'},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(6,12,26,.95)',borderColor:'rgba(0,144,255,.3)',borderWidth:1,callbacks:{label:c=>` ${c.parsed.y}% confidence`}}},
      scales:{y:{max:100,ticks:{color:TXTC,font:{size:10},callback:v=>v+'%'},grid:{color:GRID},border:{display:false}},x:{ticks:{color:TXTC,font:{size:9}},grid:{display:false},border:{display:false}}}
    }
  });

  // RADAR
  const skills = student.soft_skills || {};
  const sLabels = {communication:'Comm.',leadership:'Lead.',creativity:'Create.',analytical_thinking:'Analyt.',problem_solving:'Solve.',teamwork:'Team',empathy:'Empathy',critical_thinking:'Critical',time_management:'Time',adaptability:'Adapt.'};
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: Object.keys(skills).map(k=>sLabels[k]||k),
      datasets:[{data:Object.values(skills),backgroundColor:'rgba(0,144,255,.1)',borderColor:'rgba(0,144,255,.7)',borderWidth:2,pointBackgroundColor:'rgba(0,144,255,.8)',pointRadius:3}]
    },
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:900,easing:'easeOutQuart'},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(6,12,26,.95)',borderColor:'rgba(0,144,255,.3)',borderWidth:1}},
      scales:{r:{min:0,max:5,ticks:{stepSize:1,color:TXTC,font:{size:9},backdropColor:'transparent'},pointLabels:{color:TXTC,font:{size:9}},grid:{color:GRID},angleLines:{color:GRID}}}
    }
  });

  // PIE
  const ints = (student.interests||[]).map(x=>x.replace('interest_','').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()));
  const PIE_COLS = ['#0090ff','#6366f1','#06b6d4','#00ff88','#f472b6','#fbbf24','#a78bfa','#fb923c','#4ade80','#60a5fa'];
  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ints,
      datasets:[{data:ints.map(()=>1),backgroundColor:PIE_COLS.slice(0,ints.length),borderWidth:0,hoverOffset:8}]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',animation:{duration:900,easing:'easeOutQuart'},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(6,12,26,.95)',borderColor:'rgba(0,144,255,.3)',borderWidth:1,callbacks:{label:c=>' '+c.label}}}
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildCards();
  buildTabs();
  setTimeout(() => { buildCharts(); }, 200);
  setTimeout(() => { typeAI(); }, 600);
});
</script>
</body>
</html>
